{% set name = "hyram" %}
{% set version = "6.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/hyram-{{ version }}.tar.gz
  sha256: 170d9cd60c0d049b153f1d61de37e334f205ed78c449985ed90c238484c7550b

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python >3.6,<3.11
    - pip
  run:
    - python >3.6,<3.11
    - matplotlib-base
    - scipy
    - coolprop >=6.3
    - numpy

test:
  imports:
    - hyram
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://hyram.sandia.gov/
  summary: Hydrogen Plus Other Alternative Fuels Risk Assessment Models Python Package
  license: GPL-3.0-only
  license_file:
    - COPYING.txt

extra:
  recipe-maintainers:
    - EthanHecht
    - bdehrha
    - bliu1013
